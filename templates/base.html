<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Квизы в Красногорске — Поумничай мне тут!{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Интеллектуальные квизы и музыкальное лото в Красногорске и Московской области{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <canvas id="particles" class="particles-layer" aria-hidden="true"></canvas>
    <div class="page-glow page-glow-one"></div>
    <div class="page-glow page-glow-two"></div>

    <header class="site-header">
        <nav class="container site-nav">
            <a href="/" class="logo"><img src="/static/images/logo-quiz.png" alt="Поумничай мне тут!"></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/#formats">Форматы</a></li>
                <li><a href="/schedule">Расписание</a></li>
                <li><a href="/#gallery">Фото</a></li>
                <li><a href="/#faq">FAQ</a></li>
                <li><a href="/#contacts">Контакты</a></li>
            </ul>
            <div class="nav-right">
                <a href="/schedule" class="btn btn-primary nav-cta">Записаться</a>
                <button class="nav-burger" id="nav-burger" aria-label="Меню" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-logos">
                <img src="/static/images/logo-quiz.png" alt="Поумничай мне тут!">
                <img src="/static/images/logo-hitloto.png" alt="Хит лото">
            </div>
            <p>Квизы и музыкальное лото в Красногорске и Московской области</p>
            <p>Вопросы и запись: <a href="https://t.me/Vlad_Ah">Telegram @Vlad_Ah</a></p>
        </div>
    </footer>

    <script src="/static/main.js"></script>
</body>
</html>
